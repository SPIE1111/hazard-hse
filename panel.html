<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel HSE · SPIE</title>
<style>
  :root{
    --ink:#0f2233; --steel:#0a3d62; --line:#dce3ea; --bg:#f4f6f8;
    --amber:#f5b800; --red:#c0392b; --green:#1a8a4a; --muted:#6b7a89; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}
  .hide{display:none!important}
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:32px;width:100%;max-width:380px;box-shadow:0 8px 30px rgba(10,61,98,.08)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .brand .mark{width:34px;height:34px;background:var(--steel);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--amber);font-weight:800;font-size:15px}
  h1{font-size:19px;font-weight:700}
  .sub{color:var(--muted);font-size:13px;margin-bottom:22px}
  label{display:block;font-size:13px;font-weight:600;margin:14px 0 5px}
  input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:inherit;background:#fbfcfd}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--steel)}
  .btn{background:var(--steel);color:#fff;border:none;padding:12px 18px;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:18px}
  .btn:hover{background:#08324f}
  .btn.sm{width:auto;padding:8px 14px;font-size:13px;margin:0}
  .btn.ghost{background:transparent;color:var(--steel);border:1px solid var(--line)}
  .btn.danger{background:var(--red)}
  .btn.danger:hover{background:#a5321f}
  .btn.green{background:var(--green)}
  .btn.green:hover{background:#146c3a}
  .err{color:var(--red);font-size:13px;margin-top:12px;display:none}
  .err.show{display:block}
  header{background:var(--steel);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  header .who{font-size:13px;opacity:.9}
  header .mark{width:30px;height:30px;background:rgba(255,255,255,.12);border-radius:7px;display:inline-flex;align-items:center;justify-content:center;color:var(--amber);font-weight:800;margin-right:10px}
  .navbtn{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin:0}
  .navbtn.active{background:var(--amber);color:var(--steel);border-color:var(--amber)}
  .wrap{max-width:1100px;margin:0 auto;padding:20px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .toolbar input,.toolbar select{width:auto;flex:1;min-width:130px}
  .stat{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .pill{background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600}
  .pill b{color:var(--steel)}
  table{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  th{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:11px 12px;border-bottom:2px solid var(--line);background:#fafbfc}
  td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  tr:last-child td{border-bottom:none}
  tr.main:hover td{background:#fafcff;cursor:pointer}
  .tag{display:inline-block;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:600}
  .tag.abierto{background:#fff3d6;color:#8a6d00}
  .tag.cerrado{background:#daf5e5;color:var(--green)}
  .tag.proceso{background:#e3edf7;color:var(--steel)}
  .tag.activo{background:#daf5e5;color:var(--green)}
  .tag.baja{background:#f6dcd8;color:var(--red)}
  .catcode{font-weight:700;color:var(--steel)}
  .seg{font-size:12.5px;color:var(--muted)}
  .seg .one{margin-bottom:2px}
  .seg .who{color:var(--ink);font-weight:600}
  .seg-toggle{color:var(--steel);cursor:pointer;font-weight:600;font-size:12.5px;background:none;border:none;padding:2px 0}
  .seg-none{color:#aab4bd;font-size:12.5px}
  .foto-ico{font-size:15px}
  .foto-ico.no{opacity:.25}
  .fotobox{margin-bottom:14px}
  .fotobox .k{color:var(--muted);margin-bottom:6px;font-size:14px}
  .fotobox img{max-width:100%;max-height:220px;border-radius:9px;border:1px solid var(--line);display:block}
  #modal{position:fixed;inset:0;background:rgba(15,34,51,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:20}
  #modal.show{display:flex}
  .sheet{background:#fff;border-radius:14px;max-width:640px;width:100%;max-height:90vh;overflow:auto}
  .sheet-h{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff}
  .sheet-b{padding:22px}
  .kv{display:grid;grid-template-columns:38% 62%;gap:2px 0;font-size:14px;margin-bottom:16px}
  .kv .k{color:var(--muted);padding:6px 0}
  .kv .v{padding:6px 0;font-weight:500}
  .x{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;background:none;border:none}
  .cmt{background:#fafbfc;border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px;font-size:13px}
  .cmt .meta{color:var(--muted);font-size:12px;margin-bottom:3px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .muted{color:var(--muted);font-size:13px}
  h3{font-size:15px;margin:18px 0 10px;font-weight:700}
  .acts{display:flex;gap:6px;flex-wrap:wrap}
  .mini{padding:5px 10px;font-size:12px;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:600;color:var(--steel)}
  .mini:hover{background:#f2f6fa}
  .mini.red{color:var(--red);border-color:#eecac3}
  .mini.green{color:var(--green);border-color:#c4e8d3}
  .bulk-help{background:#f6f9fc;border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.6}
  .bulk-help code{background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px;color:var(--ink);display:inline-block;white-space:pre;font-family:'Courier New',monospace}
  .bulk-res{margin-top:12px;font-size:13px}
  .bulk-res .okc{color:var(--green);font-weight:700}
  .bulk-res .failc{color:var(--red);font-weight:700}
  @media(max-width:640px){.kv{grid-template-columns:1fr}.hide-sm{display:none}}
</style>
<script src="xlsx.min.js"></script>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="brand"><div class="mark">HSE</div><h1>Panel HSE</h1></div>
    <p class="sub">Gestión de reportes · SPIE</p>
    <label>Usuario</label>
    <input id="l-user" autocomplete="username" placeholder="Nómina o usuario"/>
    <label id="l-pass-lbl">Contraseña</label>
    <input id="l-pass" type="password" autocomplete="current-password" placeholder="••••••••"/>
    <div id="l-pass2-wrap" class="hide">
      <label>Confirma la contraseña</label>
      <input id="l-pass2" type="password" placeholder="••••••••"/>
      <p class="muted" style="margin-top:6px">Primer ingreso: crea tu contraseña (mínimo 8 caracteres).</p>
    </div>
    <button class="btn" onclick="doLogin()" id="l-btn">Entrar</button>
    <p class="err" id="l-err"></p>
  </div>
</div>

<div id="app" class="hide">
  <header>
    <div><span class="mark">HSE</span><b>Panel HSE</b></div>
    <div class="row">
      <button class="navbtn active" id="nav-hazards" onclick="showView('hazards')">Hazards</button>
      <button class="navbtn hide" id="nav-emp" onclick="showView('emp')">Empleados</button>
      <span class="who" id="who"></span>
      <button class="btn sm ghost" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="logout()">Salir</button>
    </div>
  </header>

  <!-- VISTA HAZARDS -->
  <div class="wrap" id="view-hazards">
    <div class="stat" id="stats"></div>
    <div class="toolbar">
      <input id="q" placeholder="Buscar por empleado, parque, código..." oninput="render()"/>
      <select id="fEstatus" onchange="render()">
        <option value="">Todos los estatus</option>
        <option>Abierto</option><option>En proceso</option><option>Cerrado</option>
      </select>
      <select id="fNivel" onchange="render()">
        <option value="">Todas las categorías</option>
      </select>
      <button class="btn sm" onclick="exportCSV()">Exportar Excel</button>
    </div>
    <table>
      <thead><tr>
        <th>Código</th><th>Fecha</th><th class="hide-sm">Empleado</th>
        <th>Parque</th><th>Categoría</th><th>Estatus</th><th>Fotos</th><th>Seguimiento</th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <p class="muted" id="empty" style="text-align:center;padding:30px;display:none">No hay hazards que coincidan.</p>
  </div>

  <!-- VISTA EMPLEADOS (solo admin) -->
  <div class="wrap hide" id="view-emp">
    <div class="toolbar">
      <input id="emp-q" placeholder="Buscar por nombre o nómina..." oninput="renderEmp()"/>
      <select id="emp-filter" onchange="renderEmp()">
        <option value="activos">Solo activos</option>
        <option value="todos">Todos (incluye bajas)</option>
        <option value="bajas">Solo bajas</option>
      </select>
      <button class="btn sm" onclick="openEmpForm()">+ Alta individual</button>
      <button class="btn sm ghost" onclick="openBulk()">Carga masiva</button>
    </div>
    <div class="stat" id="emp-stats"></div>
    <table>
      <thead><tr>
        <th>Nómina</th><th>Nombre</th><th class="hide-sm">País</th>
        <th class="hide-sm">HSE</th><th>Estado</th><th>Acciones</th>
      </tr></thead>
      <tbody id="emp-rows"></tbody>
    </table>
    <p class="muted" id="emp-empty" style="text-align:center;padding:30px;display:none">No hay empleados que coincidan.</p>
  </div>
</div>

<div id="modal">
  <div class="sheet">
    <div class="sheet-h">
      <b id="m-code"></b>
      <button class="x" onclick="closeModal()">&times;</button>
    </div>
    <div class="sheet-b" id="m-body"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://lzvkrechpvxuaczvhfwh.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6dmtyZWNocHZ4dWFjenZoZndoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTA1NzMsImV4cCI6MjA5NzM2NjU3M30.qLxLeMl7vVusb1jC4R_nQWYxdRWSB9GK-xcvbGAo-oA"; // pública: RLS protege la tabla empleados

let SESSION = null, HAZARDS = [], _needsPass = false;
let COMMENTS_BY_CODE = {};
let EMPLEADOS = [], EMP_CAT = null; // catálogos: paises, hse, oficinas

const CLASIFICACION = [
  {codigo:"A",label:"Transporte"},
  {codigo:"B",label:"Salud / Ergonomía"},
  {codigo:"C",label:"Drogas y Alcohol"},
  {codigo:"D",label:"Riesgo Eléctrico"},
  {codigo:"E",label:"Incendio"},
  {codigo:"F",label:"Comportamiento Humano"},
  {codigo:"G",label:"Seguridad / Delincuencia"},
  {codigo:"H",label:"Caída Mismo Nivel"},
  {codigo:"I",label:"Permisos / Normativa"},
  {codigo:"J",label:"Herramientas / Maquinaria"},
  {codigo:"K",label:"Condiciones Climáticas"},
  {codigo:"L",label:"Trabajo en Altura"},
  {codigo:"M",label:"Presión"},
  {codigo:"N",label:"Campos Electromagnéticos"},
  {codigo:"Ñ",label:"Superficies Térmicas"},
  {codigo:"O",label:"Productos Peligrosos"},
  {codigo:"Q",label:"Equipamiento"},
  {codigo:"R",label:"Orden y Limpieza"},
  {codigo:"S",label:"Medio Ambiente"}
];
const CAT_LABEL = Object.fromEntries(CLASIFICACION.map(c=>[c.codigo, c.label]));

async function api(action, extra={}){
  const r = await fetch(`${SUPABASE_URL}/functions/v1/panel-api`,{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON_KEY}`},
    body:JSON.stringify({action, user:SESSION?.username||document.getElementById('l-user').value.trim(), ...extra})
  });
  return r.json();
}

async function doLogin(){
  const err=document.getElementById('l-err');
  const user=document.getElementById('l-user').value.trim();
  const pass=document.getElementById('l-pass').value;
  err.classList.remove('show');
  if(!user||!pass){err.textContent='Ingresa usuario y contraseña.';err.classList.add('show');return;}
  if(_needsPass){
    const p2=document.getElementById('l-pass2').value;
    if(pass!==p2){err.textContent='Las contraseñas no coinciden.';err.classList.add('show');return;}
    const s=await api('set-password',{user,pass});
    if(!s.ok){err.textContent=s.error||'No se pudo crear la contraseña.';err.classList.add('show');return;}
    _needsPass=false;
    document.getElementById('l-pass2-wrap').classList.add('hide');
  }
  const d=await api('login',{user,pass});
  if(d.needs_password){
    _needsPass=true;
    document.getElementById('l-pass2-wrap').classList.remove('hide');
    document.getElementById('l-pass-lbl').textContent='Crea tu contraseña';
    err.textContent='Primer ingreso: crea tu contraseña y confírmala.';err.classList.add('show');
    return;
  }
  if(!d.ok){err.textContent=d.error||'Usuario o contraseña incorrectos.';err.classList.add('show');return;}
  SESSION=d.user;
  document.getElementById('login').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  document.getElementById('who').textContent=`${SESSION.full_name} · ${SESSION.role==='admin'?'Administrador':SESSION.country_code}`;
  // Mostrar pestaña Empleados solo para admin
  if(SESSION.role==='admin'){
    document.getElementById('nav-emp').classList.remove('hide');
  }
  await loadHazards();
}

async function loadHazards(){
  const d=await api('list');
  HAZARDS = d.ok ? d.hazards : [];
  const c = await api('all-comments');
  COMMENTS_BY_CODE = {};
  if (c.ok && c.comments) {
    for (const cm of c.comments) {
      (COMMENTS_BY_CODE[cm.hazard_code] = COMMENTS_BY_CODE[cm.hazard_code] || []).push(cm);
    }
  }
  buildCategoryFilter();
  render();
}

function buildCategoryFilter(){
  const sel = document.getElementById('fNivel');
  sel.innerHTML = '<option value="">Todas las categorías</option>' +
    CLASIFICACION.map(c=>`<option value="${c.codigo}">${c.codigo} · ${c.label}</option>`).join('');
}

function escapeHtml(s){return String(s??'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}

// ═══════════ NAVEGACIÓN ENTRE VISTAS ═══════════
function showView(v){
  const isHaz = v==='hazards';
  document.getElementById('view-hazards').classList.toggle('hide', !isHaz);
  document.getElementById('view-emp').classList.toggle('hide', isHaz);
  document.getElementById('nav-hazards').classList.toggle('active', isHaz);
  document.getElementById('nav-emp').classList.toggle('active', !isHaz);
  if(!isHaz && !EMP_CAT){ loadEmpleados(); }
}

// ═══════════ HAZARDS (sin cambios) ═══════════
function segCell(code){
  const list = COMMENTS_BY_CODE[code] || [];
  if(!list.length) return '<span class="seg-none">Sin seguimiento</span>';
  const fmt = (c,i) => `<div class="one"><b>${i+1}.</b> <span class="who">Nómina ${escapeHtml(c.author)}:</span> ${escapeHtml(c.comment)}</div>`;
  if(list.length <= 2){
    return `<div class="seg">${list.map((c,i)=>fmt(c,i)).join('')}</div>`;
  }
  const id = 'seg-'+code.replace(/[^a-zA-Z0-9]/g,'');
  return `<div class="seg">${fmt(list[0],0)}<div id="${id}" class="hide">${list.slice(1).map((c,i)=>fmt(c,i+1)).join('')}</div><button class="seg-toggle" onclick="event.stopPropagation();toggleSeg('${id}',this)">+ ${list.length-1} más</button></div>`;
}
function toggleSeg(id, btn){
  const el=document.getElementById(id);
  const open=el.classList.toggle('hide')===false;
  btn.textContent = open ? 'Ver menos' : `+ ${el.children.length} más`;
}

function fotosCell(h){
  const ev = h.foto_sharepoint_url ? '📷' : '';
  const ci = h.foto_cierre_sharepoint_url ? '🏁' : '';
  if(!ev && !ci) return '<span class="seg-none">—</span>';
  let out='';
  if(ev) out += `<a href="${h.foto_sharepoint_url}" target="_blank" title="Foto de evidencia" onclick="event.stopPropagation()" class="foto-ico">📷</a> `;
  if(ci) out += `<a href="${h.foto_cierre_sharepoint_url}" target="_blank" title="Foto de cierre" onclick="event.stopPropagation()" class="foto-ico">🏁</a>`;
  return out;
}

function render(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const fe=document.getElementById('fEstatus').value;
  const fn=document.getElementById('fNivel').value;
  const filtered=HAZARDS.filter(h=>{
    const txt=`${h.hazard_code} ${h.employee_name} ${h.parque} ${h.tipo_riesgo}`.toLowerCase();
    return (!q||txt.includes(q)) && (!fe||(h.estatus||'').includes(fe)) && (!fn||h.clasif_codigo===fn);
  });
  const abiertos=HAZARDS.filter(h=>(h.estatus||'').toLowerCase().includes('abiert')).length;
  const cerrados=HAZARDS.filter(h=>(h.estatus||'').toLowerCase().includes('cerrad')).length;
  document.getElementById('stats').innerHTML=
    `<span class="pill">Total <b>${HAZARDS.length}</b></span>`+
    `<span class="pill">Abiertos <b>${abiertos}</b></span>`+
    `<span class="pill">Cerrados <b>${cerrados}</b></span>`;
  const rows=document.getElementById('rows');
  rows.innerHTML=filtered.map(h=>{
    const est=(h.estatus||'Abierto').toLowerCase();
    const cls=est.includes('cerrad')?'cerrado':est.includes('proces')?'proceso':'abierto';
    const fecha=new Date(h.created_at).toLocaleDateString('es-MX',{day:'2-digit',month:'short'});
    const cat = h.clasif_codigo ? `<span class="catcode">${h.clasif_codigo}</span> · ${CAT_LABEL[h.clasif_codigo]||''}` : '—';
    return `<tr class="main" onclick='openHazard(${JSON.stringify(h.hazard_code)})'>
      <td><b>${h.hazard_code}</b></td><td>${fecha}</td>
      <td class="hide-sm">${escapeHtml(h.employee_name)||''}</td>
      <td>${escapeHtml(h.parque)||''}</td>
      <td>${cat}</td>
      <td><span class="tag ${cls}">${h.estatus||'Abierto'}</span></td>
      <td>${fotosCell(h)}</td>
      <td onclick="event.stopPropagation()">${segCell(h.hazard_code)}</td></tr>`;
  }).join('');
  document.getElementById('empty').style.display=filtered.length?'none':'block';
}

async function openHazard(code){
  const h=HAZARDS.find(x=>x.hazard_code===code);
  if(!h)return;
  document.getElementById('m-code').textContent=h.hazard_code;
  const kv=(k,v)=>v?`<div class="k">${k}</div><div class="v">${escapeHtml(v)}</div>`:'';
  const mkFoto = (url, titulo) => {
    if(!url) return '';
    return `<div class="fotobox">
      <div class="k">${titulo}</div>
      <a href="${url}" target="_blank" rel="noopener" title="Abrir en SharePoint">
        <img src="${url}" alt="${titulo}" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block'"/>
        <span class="btn sm ghost" style="display:none">Ver ${titulo} en SharePoint</span>
      </a>
    </div>`;
  };
  const fotoEv = mkFoto(h.foto_sharepoint_url, 'Foto de evidencia');
  const fotoCi = mkFoto(h.foto_cierre_sharepoint_url, 'Foto de cierre');
  const foto = (fotoEv || fotoCi) ? `<h3>Evidencia fotográfica</h3>${fotoEv}${fotoCi}` : '';
  const catTxt = h.clasif_codigo ? `${h.clasif_codigo} · ${CAT_LABEL[h.clasif_codigo]||''}` : '';
  document.getElementById('m-body').innerHTML=`
    <div class="kv">
      ${kv('Empleado', (h.employee_name||'')+' · #'+(h.payroll_no||''))}
      ${kv('Fecha', new Date(h.created_at).toLocaleString('es-MX'))}
      ${kv('Parque', h.parque)}
      ${kv('Tipo de riesgo', h.tipo_riesgo)}
      ${kv('Categoría', catTxt)}
      ${kv('Riesgo específico', h.clasif_item)}
      ${kv('Descripción', h.descripcion)}
      ${kv('Acciones', h.acciones)}
      ${kv('HSE', h.hse_name)}
    </div>
    ${foto}
    <h3>Estatus</h3>
    <div class="row">
      <select id="m-status" style="flex:1">
        <option ${h.estatus==='Abierto'?'selected':''}>Abierto</option>
        <option ${h.estatus==='En proceso'?'selected':''}>En proceso</option>
        <option ${h.estatus==='Cerrado'?'selected':''}>Cerrado</option>
      </select>
      <button class="btn sm" onclick="saveStatus('${h.hazard_code}')">Guardar</button>
    </div>
    <h3>Seguimiento y acciones</h3>
    <div id="m-comments" class="muted">Cargando...</div>
    <div class="row" style="margin-top:10px">
      <input id="m-newcomment" placeholder="Agregar comentario o acción..." style="flex:1"/>
      <button class="btn sm" onclick="addComment('${h.hazard_code}')">Añadir</button>
    </div>`;
  document.getElementById('modal').classList.add('show');
  loadComments(h.hazard_code);
}

async function loadComments(code){
  const d=await api('get-comments',{code});
  const el=document.getElementById('m-comments');
  if(!d.ok||!d.comments.length){el.innerHTML='<span class="muted">Sin comentarios aún.</span>';return;}
  el.innerHTML=d.comments.map((c,i)=>
    `<div class="cmt"><div class="meta"><b>${i+1}.</b> Nómina ${escapeHtml(c.author)} · ${new Date(c.at).toLocaleString('es-MX')}</div>${escapeHtml(c.comment)}</div>`
  ).join('');
}

async function saveStatus(code){
  const status=document.getElementById('m-status').value;
  const d=await api('status',{code,status});
  if(d.ok){const h=HAZARDS.find(x=>x.hazard_code===code);if(h)h.estatus=status;render();alert('Estatus actualizado.');}
  else alert(d.error||'No se pudo actualizar.');
}

async function addComment(code){
  const comment=document.getElementById('m-newcomment').value.trim();
  if(!comment)return;
  const d=await api('comment',{code,comment});
  if(d.ok){
    document.getElementById('m-newcomment').value='';
    loadComments(code);
    const c = await api('all-comments');
    COMMENTS_BY_CODE = {};
    if (c.ok && c.comments) for (const cm of c.comments)
      (COMMENTS_BY_CODE[cm.hazard_code]=COMMENTS_BY_CODE[cm.hazard_code]||[]).push(cm);
    render();
  } else alert(d.error||'No se pudo agregar.');
}

function closeModal(){document.getElementById('modal').classList.remove('show');}
function logout(){SESSION=null;location.reload();}

async function exportCSV(){
  if (typeof XLSX === 'undefined') { alert('La librería de Excel no cargó. Verifica que xlsx.min.js esté subido junto al panel.'); return; }
  const [exp, com] = await Promise.all([ api('export'), api('all-comments') ]);
  const rows = exp.ok ? exp.rows : HAZARDS;
  const comments = com.ok ? com.comments : [];
  const hoja1 = rows.map(h=>({
    'Código': h.hazard_code,
    'Fecha': h.created_at ? new Date(h.created_at).toLocaleString('es-MX') : '',
    'País': h.country,
    'Empleado': h.employee_name,
    'Nómina': h.payroll_no,
    'Parque': h.parque,
    'Categoría': h.clasif_codigo ? (h.clasif_codigo+' · '+(CAT_LABEL[h.clasif_codigo]||'')) : '',
    'Tipo de riesgo': h.tipo_riesgo,
    'Riesgo específico': h.clasif_item,
    'Descripción': h.descripcion,
    'Acciones': h.acciones,
    'Estatus': h.estatus,
    'Fecha cierre': h.fecha_cierre || '',
    'HSE': h.hse_name,
    'Foto evidencia (SharePoint)': h.foto_sharepoint_url || '',
    'Foto cierre (SharePoint)': h.foto_cierre_sharepoint_url || '',
    'Seguimiento (resumen)': h.seguimiento || ''
  }));
  const hoja2 = comments.map(c=>({
    'Código Hazard': c.hazard_code,
    'Nómina': c.author,
    'Fecha': c.at ? new Date(c.at).toLocaleString('es-MX') : '',
    'Comentario / Acción': c.comment
  }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(hoja1), 'Hazards');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(hoja2.length?hoja2:[{'Sin comentarios':''}]), 'Seguimiento');
  XLSX.writeFile(wb, `hazards_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ═══════════════════════════════════════════════
// MANTENIMIENTO DE EMPLEADOS (solo admin)
// ═══════════════════════════════════════════════
function paisNombre(id){ const p=(EMP_CAT?.paises||[]).find(x=>x.id===id); return p?`${p.flag_emoji} ${p.name}`:('País '+id); }
function paisCode(id){ const p=(EMP_CAT?.paises||[]).find(x=>x.id===id); return p?p.code:''; }
function codeToPaisId(code){ const p=(EMP_CAT?.paises||[]).find(x=>x.code===String(code).toUpperCase()); return p?p.id:null; }
function zonasDePais(id){ return (EMP_CAT?.hse||[]).filter(h=>h.country_id===id); }

async function loadEmpleados(){
  const cat = await api('emp-catalogos');
  if(!cat.ok){ alert(cat.error||'No se pudieron cargar los catálogos.'); return; }
  EMP_CAT = cat;
  const d = await api('emp-list', {incluir_bajas:true});
  EMPLEADOS = d.ok ? (d.employees||[]) : [];
  renderEmp();
}

function renderEmp(){
  const q=(document.getElementById('emp-q').value||'').toLowerCase();
  const filtro=document.getElementById('emp-filter').value;
  let list = EMPLEADOS.filter(e=>{
    const txt=`${e.payroll_no} ${e.full_name}`.toLowerCase();
    if(q && !txt.includes(q)) return false;
    if(filtro==='activos') return e.active;
    if(filtro==='bajas') return !e.active;
    return true;
  });
  const activos = EMPLEADOS.filter(e=>e.active).length;
  const bajas = EMPLEADOS.filter(e=>!e.active).length;
  document.getElementById('emp-stats').innerHTML =
    `<span class="pill">Total <b>${EMPLEADOS.length}</b></span>`+
    `<span class="pill">Activos <b>${activos}</b></span>`+
    `<span class="pill">Bajas <b>${bajas}</b></span>`;
  const rows=document.getElementById('emp-rows');
  rows.innerHTML = list.map(e=>{
    const estado = e.active
      ? '<span class="tag activo">Activo</span>'
      : '<span class="tag baja">Baja</span>';
    const acts = e.active
      ? `<button class="mini" onclick='editEmp("${e.payroll_no}")'>Editar</button>
         <button class="mini red" onclick='bajaEmp("${e.payroll_no}","${escapeHtml(e.full_name)}")'>Dar de baja</button>`
      : `<button class="mini green" onclick='reactivarEmp("${e.payroll_no}")'>Reactivar</button>`;
    const zona = e.hse_zone ? ` · ${e.hse_zone}` : '';
    return `<tr>
      <td><b>${escapeHtml(e.payroll_no)}</b></td>
      <td>${escapeHtml(e.full_name)}</td>
      <td class="hide-sm">${paisNombre(e.country_id)}${zona}</td>
      <td class="hide-sm">${escapeHtml(e.hse_name)||'—'}</td>
      <td>${estado}</td>
      <td><div class="acts">${acts}</div></td>
    </tr>`;
  }).join('');
  document.getElementById('emp-empty').style.display=list.length?'none':'block';
}

// ── Formulario de alta / edición ──
function paisOptions(sel){
  return (EMP_CAT?.paises||[]).map(p=>
    `<option value="${p.id}" ${p.id===sel?'selected':''}>${p.flag_emoji} ${p.name}</option>`
  ).join('');
}
function oficinaOptions(paisId, sel){
  const ofs=(EMP_CAT?.oficinas||[]).filter(o=>o.country_id===paisId || o.country_id===null);
  return '<option value="">— Sin oficina fija (campo) —</option>'+
    ofs.map(o=>`<option value="${o.id}" ${o.id===sel?'selected':''}>${escapeHtml(o.name)}</option>`).join('');
}
function zonaRow(paisId, selZona){
  const zonas=zonasDePais(paisId);
  // Solo mostrar selector de zona si el país tiene más de una zona (México)
  if(zonas.length>1){
    return `<label>Zona / HSE</label>
      <select id="ef-zona">
        ${zonas.map(z=>`<option value="${z.zone_code}" ${z.zone_code===selZona?'selected':''}>${z.zone_code} · ${escapeHtml(z.full_name)}</option>`).join('')}
      </select>`;
  }
  // País con un solo HSE: mostrar informativo, sin selector
  const hse=zonas[0];
  return `<input type="hidden" id="ef-zona" value="${hse?(hse.zone_code||''):''}"/>
    <p class="muted" style="margin-top:8px">HSE asignado: <b>${hse?escapeHtml(hse.full_name):'—'}</b></p>`;
}

function empFormHtml(emp){
  const paisId = emp ? emp.country_id : (EMP_CAT.paises[0]?.id);
  return `
    <label>Número de nómina</label>
    <input id="ef-payroll" value="${emp?escapeHtml(emp.payroll_no):''}" ${emp?'disabled':''} placeholder="Ej. 1234"/>
    ${emp?'<p class="muted" style="margin-top:4px">La nómina no se puede cambiar.</p>':''}
    <label>Nombre completo</label>
    <input id="ef-name" value="${emp?escapeHtml(emp.full_name):''}" placeholder="Nombre y apellidos"/>
    <label>País</label>
    <select id="ef-pais" onchange="onEfPaisChange()">${paisOptions(paisId)}</select>
    <div id="ef-zona-wrap">${zonaRow(paisId, emp?emp.hse_zone:null)}</div>
    <label>Oficina (opcional)</label>
    <select id="ef-oficina">${oficinaOptions(paisId, emp?emp.office_id:null)}</select>
    <button class="btn" onclick="saveEmp(${emp?`'${emp.payroll_no}'`:'null'})">${emp?'Guardar cambios':'Dar de alta'}</button>
    <p class="err" id="ef-err"></p>`;
}

function onEfPaisChange(){
  const paisId=parseInt(document.getElementById('ef-pais').value,10);
  document.getElementById('ef-zona-wrap').innerHTML=zonaRow(paisId, null);
  document.getElementById('ef-oficina').innerHTML=oficinaOptions(paisId, null);
}

function openEmpForm(){
  document.getElementById('m-code').textContent='Alta de empleado';
  document.getElementById('m-body').innerHTML=empFormHtml(null);
  document.getElementById('modal').classList.add('show');
}

function editEmp(payroll){
  const emp=EMPLEADOS.find(e=>e.payroll_no===payroll);
  if(!emp)return;
  document.getElementById('m-code').textContent='Editar empleado';
  document.getElementById('m-body').innerHTML=empFormHtml(emp);
  document.getElementById('modal').classList.add('show');
}

async function saveEmp(payrollEdit){
  const err=document.getElementById('ef-err');
  err.classList.remove('show');
  const payroll = payrollEdit || document.getElementById('ef-payroll').value.trim();
  const full_name = document.getElementById('ef-name').value.trim();
  const country_id = parseInt(document.getElementById('ef-pais').value,10);
  const zonaEl = document.getElementById('ef-zona');
  const zone = zonaEl ? (zonaEl.value||null) : null;
  const ofEl = document.getElementById('ef-oficina');
  const office_id = ofEl && ofEl.value ? parseInt(ofEl.value,10) : null;
  if(!payroll || !full_name){ err.textContent='Nómina y nombre son obligatorios.'; err.classList.add('show'); return; }
  const action = payrollEdit ? 'emp-edit' : 'emp-add';
  const d = await api(action, {payroll, full_name, country_id, zone, office_id});
  if(d.ok){ closeModal(); await loadEmpleados(); }
  else { err.textContent=d.error||'No se pudo guardar.'; err.classList.add('show'); }
}

async function bajaEmp(payroll, nombre){
  if(!confirm(`¿Dar de baja a ${nombre} (nómina ${payroll})?\n\nSe conservará su historial de reportes.`)) return;
  const d=await api('emp-deactivate',{payroll});
  if(d.ok){ await loadEmpleados(); }
  else alert(d.error||'No se pudo dar de baja.');
}

async function reactivarEmp(payroll){
  const d=await api('emp-reactivate',{payroll});
  if(d.ok){ await loadEmpleados(); }
  else alert(d.error||'No se pudo reactivar.');
}

// ── Carga masiva ──
function openBulk(){
  document.getElementById('m-code').textContent='Carga masiva de empleados';
  document.getElementById('m-body').innerHTML=`
    <div class="bulk-help">
      Pega una fila por empleado, con estas columnas en orden:<br><br>
      <code>Nómina    Nombre completo    País    Zona</code><br><br>
      • <b>País</b>: usa el código MX, UY, RD o CL.<br>
      • <b>Zona</b>: solo para México (ESPINAL o CDMX). Los demás países se dejan sin zona.<br>
      • Separadas por TAB (copiando de Excel) o por comas. El sistema lo detecta.<br><br>
      Ejemplo:<br>
      <code>1234    Juan Pérez López    MX    ESPINAL
1235    María García    MX    CDMX
1236    Carlos Méndez    UY
1237    Ana Torres    RD</code>
    </div>
    <textarea id="bulk-text" style="min-height:160px" placeholder="Pega aquí las filas..."></textarea>
    <button class="btn" onclick="procesarBulk()">Procesar carga</button>
    <div class="bulk-res" id="bulk-res"></div>`;
  document.getElementById('modal').classList.add('show');
}

function parseBulkLine(line){
  // Detecta separador: TAB si existe, si no coma
  const sep = line.includes('\t') ? '\t' : ',';
  return line.split(sep).map(s=>s.trim());
}

async function procesarBulk(){
  const raw=document.getElementById('bulk-text').value;
  const res=document.getElementById('bulk-res');
  const lines=raw.split('\n').map(l=>l.trim()).filter(l=>l.length);
  if(!lines.length){ res.innerHTML='<span class="failc">No hay filas para procesar.</span>'; return; }
  const rows=[]; const locales=[];
  lines.forEach((line,idx)=>{
    const cols=parseBulkLine(line);
    const [payroll, full_name, paisCode, zona] = cols;
    const country_id = codeToPaisId(paisCode);
    if(!payroll || !full_name || !country_id){
      locales.push({payroll:payroll||'(vacío)', error:'Fila '+(idx+1)+': faltan datos o país inválido.'});
      return;
    }
    rows.push({payroll, full_name, country_id:String(country_id), zone:(zona||''), office_id:''});
  });
  if(!rows.length){
    res.innerHTML=`<span class="failc">Ninguna fila válida.</span><br>`+
      locales.map(e=>`<div class="muted">• ${escapeHtml(e.error)}</div>`).join('');
    return;
  }
  res.innerHTML='Procesando...';
  const d=await api('emp-add-bulk',{rows});
  if(!d.ok){ res.innerHTML=`<span class="failc">${escapeHtml(d.error||'Error en la carga.')}</span>`; return; }
  const errServer = (d.errores||[]);
  const totalFail = locales.length + (d.fallidos||0);
  let html = `<span class="okc">✓ ${d.agregados||0} agregado(s)</span>`;
  if(totalFail) html += ` &nbsp; <span class="failc">✗ ${totalFail} no agregado(s)</span>`;
  const allErrors = [...locales, ...errServer];
  if(allErrors.length){
    html += '<div style="margin-top:8px">'+allErrors.map(e=>
      `<div class="muted">• Nómina ${escapeHtml(e.payroll||'')}: ${escapeHtml(e.error||'')}</div>`
    ).join('')+'</div>';
  }
  res.innerHTML=html;
  await loadEmpleados(); // refrescar lista detrás del modal
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
</script>
